# =========================================
# KrushiKranti Backend - PostgreSQL Config
# =========================================

# Server
server.port=8080

# =========================================
# DataSource — PostgreSQL
# =========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/krushikranti_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================
# JPA / Hibernate
# =========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# =========================================
# JWT
# =========================================
app.jwt.secret=KrushiKranti_SuperSecret_JWT_Key_Change_In_Production_2024
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# =========================================
# Swagger / SpringDoc OpenAPI
# =========================================
springdoc.api-docs.path=/api/v1/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.show-extensions=true
springdoc.swagger-ui.show-common-extensions=true
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.default-models-expand-depth=3
springdoc.swagger-ui.default-model-expand-depth=3
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.persist-authorization=true
springdoc.packages-to-scan=com.krushikranti.controller
springdoc.show-actuator=false

# =========================================
# CORS (Frontend Dev URL)
# =========================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# =========================================
# Logging
# =========================================
logging.level.com.krushikranti=DEBUG
logging.level.org.springframework.security=INFO

# =========================================
# Cloudinary Configuration
# =========================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret}

# =========================================
# Email / SMTP Configuration (Gmail example)
# =========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# App name for emails
app.name=KrushiKranti

# =========================================
# Razorpay Configuration
# =========================================
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:rzp_secret_placeholder}

logging.level.org.hibernate.SQL=DEBUG
