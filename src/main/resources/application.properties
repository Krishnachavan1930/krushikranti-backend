# =========================================
# KrushiKranti Backend - Application Config
# =========================================

# Server
server.port=8080

# =========================================
# DataSource — MySQL
# =========================================
spring.datasource.url=jdbc:mysql://localhost:3306/krushikranti_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=19301930
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# JPA / Hibernate
# =========================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# =========================================
# JWT
# =========================================
app.jwt.secret=KrushiKranti_SuperSecret_JWT_Key_Change_In_Production_2024
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# =========================================
# Swagger / SpringDoc OpenAPI
# =========================================
springdoc.api-docs.path=/api/v1/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.show-extensions=true
springdoc.swagger-ui.show-common-extensions=true
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.default-models-expand-depth=3
springdoc.swagger-ui.default-model-expand-depth=3
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.persist-authorization=true
springdoc.packages-to-scan=com.krushikranti.controller
springdoc.show-actuator=false

# =========================================
# CORS (Frontend Dev URL)
# =========================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

